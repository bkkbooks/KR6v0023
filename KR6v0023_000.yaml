  text: 七祖法寶記下卷整理者華方田題解七祖法寶記禪宗文獻係中國禪宗僧人所編纂之佛教典籍編纂者不詳本文獻未為我國歷代經録所著録亦不為歷代大藏經所收現於敦煌遺書中發現為中國北京圖書館收藏共兩號一號為北殷號首尾均殘另一號為北新號首殘尾存有尾題七祖法寶記下卷從紙質字體內容體例諸方面均可判斷此兩號本為同卷但這兩號不能直接綴接中間尚有殘缺現存文獻之內容可分為兩部分第一部分摘録佛藏經念誦經護法普通諸部心經大般若經金剛經金剛三昧經文殊師利所説般若波羅蜜經佛説決定毗尼經如來莊嚴智慧光明入一切佛境界經法華經維摩經思益經等經典而成份量較大約占所剩全文的五分之四第二部分是諸經大乘要抄節録了十幾部大乘經典的重要內容包括楞伽經思益經佛頂經維摩經金剛三昧經法句經佛藏經藥師經決定毗尼經金剛經轉女身經大佛頂經等其中以楞伽經份量最大本文獻尾題記曰七祖法寶記下卷此七祖是誰無法確考但根據文獻中所編纂之經典的思想特點可初步推斷此七祖或為北宗神秀的弟子如普寂義福等整理本據北殷號及北新號録文無校本因原文殘缺較多故文獻中之經文正文均參校大正藏本將殘缺經文寫入校記為文從理順個別文字據大正藏本補入正文出校記説明録文首殘佛藏經諸法實相品第一亦名選諸法卷第爾時舍利弗從三昧起行詣佛所偏袒右肩頭面作禮無生無滅無相無為令人信解舍利弗譬如巧畫師畫師者為希有不希有世尊舍利弗如來所得阿耨多無為令人信解倍為希有舍利弗譬如藕絲懸須彌尊舍利弗如來所説一切諸法無生無滅無相無為令人信無所有一切世間所難信解何以故是法無想離諸想無念量所能得知無行無相無有熱惱無念過諸念無心過諸心無向無背無説無不説舍利弗我此聖法皆能降伏一切貪著者説有者説者皆違逆佛與佛共諍舍利弗乃至於法少許得者皆與佛諍與佛若非我弟子即與涅槃共諍與佛共諍與法共諍與僧共諍舍利弗如是見人利弗如是見人我則不聽受一飲水以自供養但勤修習無相三昧於無相三昧亦不取相達一切諸法相皆是一相所謂無相佛藏經念佛品云惡知識佛告舍利弗若有比丘教餘比丘汝當念佛念法念戒念僧念施念天唯愛涅槃畢竟清淨如是教者名為邪教謂是正教而是邪教舍利弗如是教者名為惡知識是人名為誹謗於我助於外道亦為他人説邪道法舍利弗如是惡人我乃不聽受一飲水以自供養舍利弗是念佛法斷語言道過出諸念不可得念是名念佛舍利弗一切諸念皆寂滅相隨順是法此即名為修習念佛不可以色念佛何以故念色取相貪味為識無行無色無緣無性是名念佛是故當知無有分別無取無捨是真念佛佛藏經念法品云善知識舍利弗是人爾時都無所有寂滅無性不集諸想滅一切法是則名為修習念佛念佛名為破善不善一切覺觀無覺無觀寂然無想名為念佛何以故不無觀名為清淨念佛舍利弗隨所念起一切諸想皆是邪見舍利無生無滅通達是者名為念佛如是念中無貪無著無逆無順無名中乃無微細小念何況粗身口意業處無念無分別空寂無相性念佛時莫取小相莫生戲論莫有分別何以故是法皆空實念佛何以故如來不名為色不名為相不名為念不是人於佛猶尚不得何況於念舍利弗如是教者是名者世間希有得不顛倒真實見故名為正見復次舍利弗正見顛倒如實而見是故如來説名正見若生我相人相衆生相者當佛藏經云惡知識舍利弗人以清淨信等諸根出家學道戲輕躁無羞言語散亂不攝諸根心不專一癡如白羊親近如是惡含果阿那含果阿羅漢果乃至失於生天之樂況涅槃道舍利弗母生離死亡喪失親里衰惱國土破壞生八難中捨於樂處遇惡知識不喜見不喜聞法不與佛衆而共和合念誦經護法普通諸部三藏金剛凡念誦先須護身結界澄想觀察本尊聖者起慈悲心愍念有情發大誓願回向菩提方可念誦持四種念珠念四種念誦一者音聲念誦二者金剛念誦合口動舌默然誦是三者是三摩地念誦心念誦是也四者真實念誦如字義修行是也能令行者速證無上菩提具一切智此心真言是一切諸佛第一義如智中流出非是作法顯現如巧色摩尼能滿諸願一切諸佛同聲共説思惟之時唯是明朗亦不見身之與心況無一物法非空故若久能熟當自證智作是觀時誦密言曰念此明者即能證入一切灌頂曼荼羅位於諸菩薩祕密法門隨意無礙作是觀時不復延促務在證入若能一一與心相應方大成就一切時處作意任運相應無所罣礙一切妄想貪瞋癡等除自然不起性常清淨此真實法門是一切衆生自性清淨心名為大圓鏡智上從諸佛悉皆同等無有增減但為無明妄想所覆令其法體不得顯現作是觀者便證解脫昧名為地前三賢位所有動作任運相應自然進入初地生大歡喜所以然者以觀月為方便具有三義一月清淨義離貪欲垢故二清淨源義離貪瞋熱惱故三者光明義離愚癡故所以取月為喻亦莫作月解世間月者四大所成畢竟破壞衆生自性清淨心無生滅故此是佛菩薩內證非二乘聲聞外道所知境界作此觀者一切佛法恆沙功德不由他悟此一法攝無量剎那悟入諸法中自作無礙從地至地漸漸升進覺此觀者不得專守無念以為究竟當須正念進修方便然後證入清淨究竟法海般若波羅蜜多心經三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神咒是大明咒是無上咒是無等等咒能除一切苦真實不虛金剛三昧經真性空品第六舍利弗言如尊所説在事之先取以本利是念寂滅寂滅是如總持諸德該羅萬法圓融不二不可思議當知是法即是摩訶般若波羅蜜多是大神咒是大明咒是無上咒是無等等咒佛言如是如是真如空性性空智火燒滅諸結平等平等等覺三地妙覺三身於九識中皎然明淨無有諸影若有衆生無餘雜念爾時菩薩常作化身擁護是人不離左右大般若經魔愁品若有衆生修行般若波羅蜜者與不憶不念相應一切魔家眷屬悉皆憂愁不樂佛藏經云舍利弗我法無諸難事不乏飲食臥具醫藥汝等但當勤行佛道莫貴世間財利供養舍利弗汝今善聽我當語汝若有一心行道比丘千億天神皆共同心以諸樂具欲共供養舍利弗諸人供養坐禪比丘不及天神假佛一切形像是金剛經云凡是有相皆是虛妄若以色見我以音聲求我是人行邪道不能見如來佛藏經云舍利弗我餘經説若人見法是為見我如來非法亦非非法不順有相不依無相即是見法見法者見本性何以故調達愚人及諸外道皆以色身見佛舍利弗如來不應以色身見亦復不應以音聲見舍利弗若人以色身見佛是去佛遠所以者何佛不名見名為見佛不依有見不依無見即是正見維摩經云夫求法者不著佛求不著法求不著衆求法名無染若染於法乃至涅槃是即染著非求法也法名無為若行有為是求有為非求法也唯舍利弗法離見聞覺知若行見聞覺知是則見聞覺知非求法也唯舍利弗夫求法者於一切法應無所求法華經云無上寶聚不求自得若人不求種種世法亦不求佛法即是真求法人真佛者識心見性悟理之人即是真佛金剛經云離一切諸相即名諸佛離有離無故不垢不淨故無生無體故法身禮入佛境界經云佛常在世間而不染世法以不分別世間故敬禮無所觀虛空無中邊諸佛體亦然心同虛空故敬禮無所觀一切平等禮無禮無不禮一禮遍含識同歸實相體實相者不相有相不依無相是楞伽經云爾時大慧白佛言世尊願為我説諸佛體性佛言大慧覺二無我除二種障離二種死斷二種煩惱是佛體性大慧聲聞緣覺得此法已亦名為佛我以善知二無我除二障二惱及不思議死是故名如來假三寶剃髮披袈裟受二百五十戒是僧寶若不識心不見性總無寶真寂根菩薩曰佛法衆為二佛則是法法則是衆是三寶行者是為入不二法門不隨有行不依無行即是隨法之人思益經云離法見身於是觀中不見二相不見不二相如是現前知尾殘首殘識不生無生可無止亦不住於無止亦不住於無住云何是生菩薩白佛言無生之心有何取捨住何法相佛言無生之心不取不捨住於不心住於不法不住諸行心常空寂無有異相譬如虛空無有動住無起無作無彼無此得空心眼得法身空五陰六入悉皆空寂善男子修空法者不依三界不住戒相清淨無念無攝無放性等金剛不壞三寶空心不動具六波羅蜜解脫菩薩白佛言尊者六波羅蜜者皆是有相有相之法能出世也佛言善男子我所説六波羅蜜者無相無為何以故若人離欲心常清淨實語方便本利利人是檀波羅蜜至念堅固心常無住清淨不染不著三界是尸波羅蜜修空斷結不依諸有寂淨三業不住身心是羼提波羅蜜遠離名數斷空有見深入陰空是毗梨耶波羅蜜俱離空寂不住於空心處無住不住大空是禪波羅蜜心無心相不取虛空諸行不生不證寂滅心無出入性常平等諸法實際皆決定性不依諸地不住智慧是般若波羅蜜善男子是六波羅蜜者皆獲本利入決定性超然出世無礙解脫解脫菩薩而説偈言大覺滿足尊入於決定處無相無有行空心寂滅地寂滅心無生不壞於三寶具六波羅蜜佛言無忍不生心者心無形段猶如火性雖在木中其在無所決定性故但名但字性不可得欲詮其理假説為名名不可得心相亦爾是決定性亦不一不異不斷不常不入不出不生不滅離諸四謗言語道斷無生無心亦復如是心王菩薩言如無生行性相空寂無見無聞無得無失無言無説無知無相無取無捨云何取證若取證者即為諍論無諍無論乃無生行佛言總持無相則無三受等三悉皆寂滅清淨無住不入三昧不住坐禪無生無行心王菩薩言禪能攝動定諸幻亂云何不禪佛言菩薩禪即是動不動不禪是無生禪禪性無生離生禪相禪性無住離住禪動若知禪性無有動靜即得無生無生般若無住菩薩言一切境空如何有見佛言見即為妄何以故一切萬有無生無相本不自名悉皆空寂一切法相亦復如是一切衆生身亦復如是身尚不有云何有見善男子覺者不住涅槃何以故覺本無生離衆生垢覺本無寂離涅槃動住如是地心無所住無有出入佛言一念心動五陰俱生五陰生中具六十惡無住菩薩言十方遍計皆由一念心生尊者大覺尊説生無念法無念無生心心常生不滅入實際品大力菩薩白佛言尊者如如所説五空出入無有取捨云何五空而不取捨佛言菩薩五空者三有是空六道影是空法相是空名相是空心識義是空菩薩如是等空空不住空空無空相無相之法有何取捨入無取地則入三空大力菩薩言云何三空佛言三空者空相亦空空空亦空所空亦空如是等空不住三相不無真實文言道斷不可思議菩薩無名義相不可思議何以故無名之名不在於名無義之義不無於義佛言如是衆生之心實無別境何以故心本淨故理無穢故以染塵故名為三界三界之心名為別境是境虛空從心化生若心無妄即無別境佛言菩薩彼心喘者以內外使隨使流注瀝滴成海大力菩薩言云何存用云何觀之佛言心事不二是名存用內行外行出入不二不住一相心無得失一不一地淨心流入是名觀之菩薩如是之人不在二相雖不出家不住在家故雖無法服不具持波羅提叉不入布薩能以自心無為自恣而獲聖果大力菩薩言如是之人應不持戒於彼沙門應不敬仰佛言為説戒者不善慢故海波浪故如彼心地八識海澄九識流淨風不能動波浪不起戒性等空持者迷倒金剛三昧經真性空品下卷善男子善不善法從心化生一切境界意言分別制之一處衆緣斷滅何以故一本不起三用無施舍利弗言不住事相不無功用是法真空常樂我淨超於二我大般涅槃其心不繫是大力觀一切萬法皆悉言文言文之相即非為義如實之義不可言説今者如來云何説法佛言我説法者以汝衆生在生説故説不可説是故説之我所説者義語非文衆生説者文語非義不言義者皆是妄語善男子是法非因非緣智自用故非動非靜用性空故義非有無空相空故善男子若化衆生令彼衆生觀入是義入是義者是見如來舍利弗言如來義觀不住諸流應離四禪而超有頂佛言如是何以故一切法名數四禪亦如是若見如來者如來心自在常在寂滅處不出亦不入內外平等故善男子如彼諸禪觀皆為想空定是如非復彼何以故以如觀如實不見觀如相諸相相已寂滅寂滅即如義如彼想禪定是動非是禪何以故禪性離諸動非染非所染非法非影離諸分別本義義故善男子如是觀定乃名為禪舍利弗言不可思議如來常以如實而化衆生如是實義多文廣義利根衆生乃可修之鈍根衆生難以措意云何方便令彼鈍根得入是諦佛言令彼鈍根受持一四句偈即入實諦一切佛法攝在一四偈中舍利弗言云何一四句偈願為説之於是尊者而説偈言因緣所生義是義滅非生滅諸生滅義是義生非滅法從分別生還從分別滅滅諸分別法是法非生滅離識法即空故從空處説滅諸生滅法而住於涅槃一切空寂法是法寂不空彼心不空時是得心不有法本無有無自他亦復爾不始亦不終成敗則不住地藏菩薩言不可思議不思議聚七五不生八六寂滅無相空無有空無有無空無有如尊所説法義皆空知有非實如陽炎水知實非無如火性生如是觀者是人智也佛言以淨心見佛以見佛故當生淨土性空寂滅時是法是時現佛言猶如暗室若遇明燈暗即滅矣一入觀時諸罪悉滅文殊師利所説般若波羅蜜經諸佛世界放無量光明説無盡妙法教諸菩薩入一相門得無所畏善降衆魔教化度脫外道邪見若有衆生樂聲聞者説聲聞乘樂緣覺乘者説緣覺乘樂世間者説世間乘以布施持戒忍辱精進禪定智慧攝諸衆生未度者度未脫者脫未安者安未泥洹者令得泥洹究竟菩薩所行善入諸佛法藏如是種種功德皆悉具足佛告舍利弗若菩薩摩訶薩聞此般若波羅蜜不驚怖畏必定當得阿耨多羅三藐三菩提是善男子善女人當為大施主第一施主勝施主無第一施者當具足戒忍辱精進禪定智慧當具諸功德成就相好自不怖畏令人不怖畏究竟般若波羅蜜以不可得無相無為第一真實不可思議法故迦葉譬如三十三天人見波利質多羅樹初生皰時作如是念此皰不久必當開敷如是迦葉比丘比丘尼優婆塞優婆夷聞説此深般若波羅蜜經心生歡喜亦復如是迦葉譬如摩尼珠師見摩尼寶心生歡喜亦不假思量即知真偽何以故以慣見故譬如學射久就即巧後雖無心箭發皆中修般若波羅蜜亦如是譬如有人從遠方來後有人從彼方來説彼方流泉浴池花果茂盛勸彼人令交更説若人聞般若波羅蜜歡喜信樂不於一佛二佛而種善根以無量千萬佛所種衆善根得聞般若波羅蜜信樂受持善男子善女人聞此深般若波羅蜜不生怖畏當知是人受佛法印此法印者是佛所造是佛所貴何以故以此法印印無著法故佛説決定毗尼經亦名破壞一切心識如是我聞一時佛在舍衛國祇陀林中給孤獨園精舍與大比丘衆千二百五十人俱菩薩十萬人爾時世尊如龍王視觀察大衆已告諸菩薩仁者誰能於後世堪忍護持正法以諸方便成就衆生又舍利弗師子獸王大吼之時其餘小蟲能忍不不也世尊又如香象其所負重諸驢騾等堪忍不不也世尊又如釋梵所有威德光明色像貧窮之人能堪忍不不也世尊又舍利弗於意云何金翅鳥王所有勢力鵒鴿等鳥能堪忍不不也世尊如是舍利弗菩薩所有其心勇健善根勢力所有之罪依出離智得見諸佛又優波離菩薩乘人持不盡護戒聲聞乘人持盡護戒菩薩乘人持開通戒聲聞乘人持不開通戒優波離菩薩乘人以日初分有所犯戒於日中分思惟當得一切種智菩薩爾時不破戒身優波離如來觀察籌量為大乘人不應一向説厭離法不應一向説離欲法不應一向説速疾法常當為説發歡喜心相應説法常應向説甚深無雜無悔纏法常應為説無取無礙空無之法優波離如來先説欲難捨離名為小犯瞋易得離名為大犯爾時文殊師利語優波離言一切諸法究竟無垢能自調心乃能得見究竟毗尼一切諸法無有染污我不可得乃能得見無悔毗尼佛告優波離若有比丘作是思惟欲斷貪欲名增上慢作是思惟見諸法空名增上慢作是思惟見於無相名增上慢是名聲聞住增上慢云何名為菩薩增上慢佛乘最勝作是思惟我當於中發菩提心名增上慢行六波羅蜜當得作佛作是思惟名增上慢般若波羅蜜能得出離更無餘法而得出離作是思惟名增上慢佛告優波離若有比丘思惟諸心時不著思惟是名最勝離增上慢心心所思名為思若有所思名有縛若有思惟諸法空是名著相凡夫人若有比丘常念佛即是非真非正念將知佛從分別起實不可取亦不生是故無思能解脫須菩提而白佛言世尊云何應得云何應住云何修行云何發阿耨多羅三藐三菩提佛告須菩提諸法自相空即是三菩提平等一相無自無他不緣境界決觀心息自然悟解無有分別是非處所是人不久成佛行我行處到我到處見我見處住我住處得我得處坐我坐處無有煩惱若境若智本來不生本來不滅不來不去不一不異不因不果非惟無有亦復無無不靜不亂不散不去諸法無是有修多羅般若波羅蜜如是有如是發心上求作佛所以無求為求下度衆生所以無度為度發菩薩心有所得者即是邪見邪見之人永不見佛斷一切智名為佛智須菩提白佛言世尊所説修多羅般若波羅蜜甚深何者是佛言空相是無相是無造無作無起無生無滅無垢無淨無所有無依止無住處如虛空是修多羅般若波羅蜜甚深不可思議不生不滅相不垢不淨相不散不亂相不説不聽相不言不義相不得不失相何以故修多羅般若波羅蜜法中無是諸法相一切諸法因緣和合有皆悉畢竟空求無處所覓不可得應如是解色受想行識亦復如是諸經大乘要抄楞伽經云乃至有所立一切皆錯亂若見於自心是則無為諍又云若依止少法而有少法起若依止於事此法即便壞又云隨言而取義建立於諸法以彼建立故死墮地獄中又云理教中求我是妄垢惡見離聖教正理欲滅或反增是外道狂言智者不應説金剛經云離一切諸相即名諸佛又云若以色見我以音聲求我是人行邪道不能見如來思益經云比丘云何隨佛教云何隨佛語若稱贊毀辱其心不動是名隨佛教又云若不依文字語言是名隨佛語比丘云何應受供養答言於法無所取者云何消供養不為世法之所牽者誰人報佛恩答言依法修行者楞伽經云如是種種相墮於外道見法句經云若學諸三昧是動非坐禪心隨境界流云何名為定金剛三昧經云我不入三昧不住坐禪無生無行不動不禪是無生禪思益經云不依止欲界不住色無界行如是禪定是菩薩遍行維摩經云維摩詰訶舍利弗林間宴作訶須菩提大迦葉不平等轉女身經云無垢光女訶天帝釋汝聲聞乘人畏生死樂涅槃決定毗尼經云菩薩乘人持開通戒聲聞乘人持盡遮戒盡護戒藥師經云佛訶阿難汝聲聞人如盲如聾不識無上空義佛頂經云訶聲聞人得少為足佛藏經云舍利弗如來在世三寶一味我滅度後分為五部舍利弗惡魔於今猶尚隱身佐助調達破壞我法僧如來大智見在故弊惡魔衆不能成其大惡當來之世惡魔變身作沙門形入於僧中種種邪説令多衆生入於邪見為説邪法爾時惡人為魔所迷各執所見我是彼非舍利弗如來預見未來世中是破法事故説是深經悉斷惡魔諸所執著阿難譬如惡賊於王大臣不敢自見盜他物者不自言賊如是阿難破戒比丘成就非沙門法尚不自言我是惡人況能向餘人説自言罪人阿難如是經者破戒比丘隨得聞時能自降伏則有慚愧持戒比丘得大增長大佛頂云即時如來普告大衆及阿難言汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已説真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境見在汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄所以釋迦如來傳金襴袈裟令摩訶迦葉有雞足山待彌勒世尊下生分付今惡世時學禪者衆我令達摩祖師遂傳袈裟表其法正令後學者有其稟承也法句經云説諸精進法名增上慢説若無增上慢無善無精進若起精進心是妄非精進若能心不妄精進無有涯金剛三昧經云尊者大覺尊説生無念法無念無生心心常生不滅維摩經云不行是菩提無憶念故常求無念實相智慧楞伽經云聖者內所證常住於無念佛頂經云阿難汝暫舉心塵勞先起又云見由難見見不能及思益經云云何一切法正云何一切法邪若以心分別一切法邪若不以心分別一切法正無心法中起心分別並皆是邪楞伽經云見佛聞法皆是自心分別不起見者是名見佛又云隨言而取義建立於諸法己彼建立故死墮地獄中又云八九種識如海衆波浪習氣常增上盤根堅固依心隨境界流如鐵於磁石如水瀑流盡波浪即不起如是種種滅種種意生身我説為心量弟子非聲聞録文完
